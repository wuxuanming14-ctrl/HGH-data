<!doctype html>
<html lang="en">
  <head>
    <script>
      // Aggressive fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when libraries try to override window.fetch in restricted environments.
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { console.warn('Blocked attempt to override window.fetch'); },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // If we can't redefine it, we at least tried to intercept.
          // In some cases, defining it on the instance is enough to satisfy check-before-set logic.
        }
      })();
    </script>
